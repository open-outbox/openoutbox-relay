volumes:
  pg_data: {}
  nats_data: {}
  kafka_data: {}
  redis_data: {}

services:

  relay:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    image: openoutbox/relay:benchmark
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 32M
    env_file:
      - .env

  producer:
    build:
      context: ..
      dockerfile: ./benchmark/Dockerfile.producer
    image: openoutbox/producer:benchmark
    profiles: ["tools"]
    env_file:
      - .env

  postgres:
    image: postgres:16
    shm_size: '4gb'
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres.conf:/etc/postgresql/postgresql.conf
      - pg_data:/var/lib/postgresql/data
      - ../schema/postgres/open-outbox.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../schema/postgres/maintenance.sql:/docker-entrypoint-initdb.d/02-maintenance.sql:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    profiles: ["nats"]
    command:
      - "-js"
      - "-m"
      - "8222"
      - "--store_dir=/data"
    mem_limit: 8GB
    volumes:
      - nats_data:/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/varz"]
      interval: 2s
      timeout: 2s
      retries: 10

  nats-setup:
    image: natsio/nats-box:latest
    profiles: ["nats"]
    depends_on:
      nats:
        condition: service_healthy
    entrypoint:
      - "sh"
      - "-c"
      - |
        # Try to info the stream, if it fails, create it.
        nats str info OPENOUTBOX_EVENTS --server nats:4222 > /dev/null 2>&1 || \
        nats str add OPENOUTBOX_EVENTS \
          --server nats:4222 \
          --subjects 'openoutbox.events.>' \
          --storage memory \
          --retention limits \
          --max-msgs=-1 \
          --max-bytes=-1 \
          --discard old \
          --dupe-window 2m \
          --replicas 1 \
          --defaults

  kafka:
    image: apache/kafka:3.7.0
    profiles: ["kafka"]
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=EXTERNAL://:9092,INTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://kafka:9092,INTERNAL://kafka:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_JMX_PORT=9101
      - JMX_PORT=9101
      - KAFKA_JMX_OPTS=-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.local.only=false -Djava.rmi.server.hostname=localhost
      - KAFKA_NUM_NETWORK_THREADS=4
      - KAFKA_NUM_IO_THREADS=8
      - KAFKA_QUEUED_MAX_REQUESTS=1000
      - KAFKA_LOG_FLUSH_INTERVAL_MESSAGES=100000
      - KAFKA_LOG_FLUSH_INTERVAL_MS=5000
      - KAFKA_HEAP_OPTS=-Xmx4G -Xms4G
      - KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS=1

    volumes:
      - kafka_data:/bitnami/kafka

  kafka-setup:
    image: apache/kafka:3.7.0
    profiles: ["kafka"]
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: >
      "echo 'Waiting for Kafka...' &&
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9094 --list > /dev/null 2>&1; do sleep 1; done &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9094 --topic openoutbox.events.v1 --partitions 3 --replication-factor 1 &&
      echo 'Topic setup complete.'"

  redis:
    image: redis:6-alpine
    profiles: ["redis"]
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - 16686:16686

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--web.enable-otlp-receiver' # To enable OTel ingestion

    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml

  otel-collector:
    image: otel/opentelemetry-collector:0.149.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../configs/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - 8889:8889 # Prometheus exporter metrics
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ../configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ../configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
