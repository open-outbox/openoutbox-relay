name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true

      - name: Install Development Tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          go install github.com/segmentio/golines@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Check Formatting
        run: |
          make fmt
          git diff --exit-code || (echo "Format check failed. Run 'make fmt' locally and push." && exit 1)

      - name: Run Quality Checks
        run: |
          make lint
          git diff --exit-code || (echo "Linting check failed. Run 'make lint' locally and push." && exit 1)

      - name: Run Full Test Suite with Coverage
        env:
            OTEL_TRACES_EXPORTER: none
            OTEL_METRICS_EXPORTER: none
        # Runs unit + integration tests (via testcontainers) with the race detector amd coverage
        run: make test-cover

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          slug: open-outbox/relay
          fail_ci_if_error: true
